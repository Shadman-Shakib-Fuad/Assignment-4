<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
  <h1 class="title">Job Application Tracker</h1>

  <div class="dashboard">
    <div class="card">
      <h3>Total Jobs</h3>
      <p id="totalCount">0</p>
    </div>
    <div class="card interview">
      <h3>Interview</h3>
      <p id="interviewCount">0</p>
    </div>
    <div class="card rejected">
      <h3>Rejected</h3>
      <p id="rejectedCount">0</p>
    </div>
  </div>
    
  <div class="job-section">
    <div class="header">
      <h2>Available Jobs</h2>
      <span id="jobCount">0</span>
    </div>

    <div class="tabs">
      <button onclick="setTab('all')" id="tab-all" class="active">All</button>
      <button onclick="setTab('interview')" id="tab-interview">Interview</button>
      <button onclick="setTab('rejected')" id="tab-rejected">Rejected</button>
    </div>

    <div id="jobContainer" class="jobs"></div>
  </div>

    <script src="script.js"></script>
</body>
</html>
