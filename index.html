<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
  <h1 class="title">Job Application Tracker</h1>

  <div class="dashboard">
    <div class="card">
      <h3>Total Jobs</h3>
      <p id="totalCount">0</p>
    </div>
    <div class="card interview">
      <h3>Interview</h3>
      <p id="interviewCount">0</p>
    </div>
    <div class="card rejected">
      <h3>Rejected</h3>
      <p id="rejectedCount">0</p>
    </div>
  </div>
    

    <script src="script.js"></script>
</body>
</html>
